name: Update PROJECTS.md

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PROJECTS.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const repos = await github.rest.repos.listForUser({
              username: 'DavidBalishyan',
              type: 'public',
              per_page: 100,
              sort: 'updated',
              direction: 'desc'
            });

            const exclude = ['DavidBalishyan'];
            const projects = repos.data.filter(r => !exclude.includes(r.name) && !r.fork);

            function categorize(repos) {
              const cats = {
                Rust: [], 'C / C++': [], Web: [], Python: [],
                'Shell / Bash': [], Go: [], Other: []
              };
              const langMap = {
                Rust: 'Rust', C: 'C / C++', 'C++': 'C / C++',
                JavaScript: 'Web', TypeScript: 'Web', SCSS: 'Web', CSS: 'Web', HTML: 'Web',
                Python: 'Python', 'Jupyter Notebook': 'Python',
                Shell: 'Shell / Bash', Go: 'Go',
              };
              for (const r of repos) {
                const lang = r.language || '';
                const cat = langMap[lang] || 'Other';
                if (!cats[cat]) cats[cat] = [];
                const desc = r.description ? r.description.split('\n')[0] : '';
                cats[cat].push({ name: r.name, desc, url: r.html_url });
              }
              return cats;
            }

            function escapeMd(s) {
              return s.replace(/\|/g, '\\|');
            }

            const cats = categorize(projects);
            const order = ['Rust', 'C / C++', 'Web', 'Python', 'Shell / Bash', 'Go', 'Other'];
            const lines = ['<h2 align="left">Projects</h2>\n'];
            for (const key of order) {
              const items = cats[key].sort((a, b) => a.name.localeCompare(b.name));
              if (items.length === 0) continue;
              lines.push(`### ${key}\n`);
              lines.push('| Project | Description |');
              lines.push('|---------|-------------|');
              for (const p of items) {
                const desc = escapeMd(p.desc || '');
                lines.push(`| [${p.name}](${p.url}) | ${desc} |`);
              }
              lines.push('');
            }

            fs.writeFileSync('PROJECTS.md', lines.join('\n'));
            console.log('PROJECTS.md generated');

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git diff --quiet && git diff --staged --quiet || \
            (git add PROJECTS.md && git commit -m 'chore: update PROJECTS.md' && git push)
