name: Update README with latest repos

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest repos section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { data: repos } = await github.rest.repos.listForUser({
              username: 'DavidBalishyan',
              type: 'public',
              per_page: 10,
              sort: 'updated',
              direction: 'desc'
            });

            const latest = repos
              .filter(r => r.name !== 'DavidBalishyan' && !r.fork && !r.archived)
              .slice(0, 4);

            function esc(s) {
              return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            const langColors = {
              Rust: '#dea584', TypeScript: '#3178c6', JavaScript: '#f1e05a',
              Python: '#3572a5', Go: '#00add8', C: '#555555', 'C++': '#f34b7d',
              HTML: '#e34c26', CSS: '#563d7c', Shell: '#89e051', Lua: '#000080',
              Ruby: '#701516', PHP: '#4f5d95', SCSS: '#c6538c'
            };

            const rows = [];
            for (let i = 0; i < latest.length; i += 2) {
              const chunk = latest.slice(i, i + 2);
              const cells = chunk.map(r => {
                const desc = r.description ? r.description.split('\n')[0].trim() : '';
                const lang = r.language || '';
                const color = langColors[lang] || '#666';
                return `<td width="50%" align="center" style="padding: 12px;">
                  <a href="${r.html_url}"><b>${esc(r.name)}</b></a>
                  ${desc ? `<br><sub><i>${esc(desc)}</i></sub>` : ''}
                  <br><br>
                  <img src="https://img.shields.io/github/stars/${r.full_name}?style=social" alt="Stars">
                  <img src="https://img.shields.io/github/forks/${r.full_name}?style=social" alt="Forks">
                  ${lang ? `<br><img src="https://img.shields.io/badge/${esc(lang)}-${color.slice(1)}?style=flat" alt="${esc(lang)}">` : ''}
                </td>`;
              });
              const rowspan = chunk.length === 1 ? ' colspan="2"' : '';
              const inner = cells.join('\n    ');
              rows.push('  <tr>' + inner.replace('<td', `<td${rowspan}`) + '\n  </tr>');
            }

            const section = [
              '<!-- LATEST_REPOS:START -->',
              '<h2 align="left">Latest Repositories</h2>',
              '',
              '<table>',
              rows.join('\n'),
              '</table>',
              '<!-- LATEST_REPOS:END -->',
            ].join('\n');

            let readme = fs.readFileSync('README.md', 'utf8');

            if (/<!-- LATEST_REPOS:START -->[\s\S]*<!-- LATEST_REPOS:END -->/.test(readme)) {
              readme = readme.replace(
                /<!-- LATEST_REPOS:START -->[\s\S]*<!-- LATEST_REPOS:END -->/,
                section
              );
            } else {
              readme = readme.replace(
                /<!-- LATEST_REPOS:START -->\s*<!-- LATEST_REPOS:END -->/,
                section
              );
            }

            fs.writeFileSync('README.md', readme);
            console.log('README.md updated with latest repos');

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git diff --quiet && git diff --staged --quiet || \
            (git add README.md && git commit -m 'chore: update README with latest repos' && git push)
